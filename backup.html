<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrincParshia — Minecraft Mod Developer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #1e1e24;
    --card: #2d2d34;
    --border: rgba(255,255,255,0.08);
    --text: #eeeeec;
    --text-secondary: #b3b3ae;
    --accent: #16a085;
    --accent-light: #20cf9e;
    --accent-dark: #0c5f4f;
    --green: #57e389;
    --shadow: 0 1px 3px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.18);
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter', -apple-system, "Segoe UI", sans-serif;
    line-height:1.55;
    -webkit-font-smoothing:antialiased;
    letter-spacing:-0.011em;
    position:relative;
    overflow-x:hidden;
  }
  ::selection{ background:var(--accent-dark); color:#fff; }

  .wrap{ max-width:820px; margin:0 auto; padding:0 24px; }
  body > .wrap{ position:relative; z-index:1; }

  .banner{
    position:absolute;
    top:0; left:0; right:0;
    height:55vh;
    z-index:0;
    overflow:hidden;
    pointer-events:none;
  }
  .banner img{
    width:100%; height:100%;
    object-fit:cover;
    filter:blur(18px) saturate(1.1) brightness(0.65);
    transform:scale(1.1);
  }
  .banner::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to bottom,
      rgba(30,30,36,0) 0%,
      rgba(30,30,36,0.04) 35%,
      rgba(30,30,36,0.12) 50%,
      rgba(30,30,36,0.3) 65%,
      rgba(30,30,36,0.6) 78%,
      rgba(30,30,36,0.88) 90%,
      var(--bg) 100%);
  }

  #matrix-canvas{
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    z-index:1; /* above .banner (z-index:0) so pixels actually composite over the image instead of being hidden under it */
    pointer-events:none;
  }

  .headerbar{
    background:transparent;
    padding:20px 0;
    position:sticky; top:0; z-index:10;
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    align-items:center;
  }
  .headerbar .identity{ display:flex; justify-content:center; align-items:center; grid-column:2; }
  .headerbar .name{ font-weight:800; font-size:22px; letter-spacing:0.06em; }
  .headerbar .name .hash{ color:var(--accent-light); font-weight:900; }

  .hero{
    padding:80px 0 0;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:44px;
    min-height:calc(100vh - 80px);
  }
  .hero .pfp-wrap{
    position:relative;
    flex-shrink:0;
    width:220px; height:220px;
  }
  .hero .pfp{
    width:100%; height:100%;
    border-radius:50%;
    object-fit:cover;
    background:linear-gradient(145deg, var(--accent-light), var(--accent) 55%, var(--accent-dark));
    box-shadow:var(--shadow), 0 0 0 1.5px rgba(255,255,255,0.55);
    border:none;
  }
  .hero .pfp-decoration{
    position:absolute;
    top:50%; left:50%;
    width:var(--deco-scale, 120%);
    height:var(--deco-scale, 120%);
    transform:translate(-50%, -50%);
    object-fit:contain;
    pointer-events:none;
    z-index:2;
  }
  .hero .intro{ flex:0 1 auto; min-width:0; text-align:left; }
  .eyebrow{
    display:inline-flex; align-items:center; gap:8px;
    font-size:13px; font-weight:600; color:var(--accent-light);
    background:linear-gradient(120deg, rgba(32,207,158,0.16), rgba(22,160,133,0.1));
    padding:6px 14px;
    border-radius:999px;
    margin-bottom:18px;
    border:1px solid rgba(22,160,133,0.25);
  }
  .hero .sub{
    font-size:16px;
    color:var(--text-secondary);
    max-width:480px;
    margin-bottom:24px;
  }
  .hero .sub strong{ color:var(--text); font-weight:600; }

  .pillrow{ display:flex; flex-wrap:wrap; gap:8px; }
  .pill{
    font-size:13px; font-weight:500;
    padding:7px 14px;
    border-radius:999px;
    background:var(--card);
    border:1px solid var(--border);
    color:var(--text-secondary);
  }
  .pill.primary{
    background:linear-gradient(120deg, rgba(32,207,158,0.18), rgba(22,160,133,0.1));
    border-color:rgba(22,160,133,0.25);
    color:var(--accent-light);
  }

  @media (max-width: 620px){
    .hero{ flex-direction:column; align-items:flex-start; gap:28px; min-height:auto; padding-bottom:40px; }
    .hero .pfp-wrap{ width:140px; height:140px; }
    .headerbar .name{ font-size:16px; }
  }

  @keyframes fadeIn{ from{ opacity:0; } to{ opacity:1; } }
  @keyframes slideUpFade{ from{ opacity:0; transform:translateY(18px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes scaleFade{ from{ opacity:0; transform:scale(0.92); } to{ opacity:1; transform:scale(1); } }

  .banner{ animation:fadeIn 1.1s ease-out both; }
  .headerbar{ animation:slideUpFade 0.7s ease-out both; }
  .hero .pfp-wrap{ animation:scaleFade 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) 0.15s both; }
  .hero .intro > *{ animation:slideUpFade 0.6s ease-out both; }
  .hero .intro .eyebrow{ animation-delay:0.25s; }
  .hero .intro .sub{ animation-delay:0.35s; }
  .hero .intro .pillrow{ animation-delay:0.45s; }

  @media (prefers-reduced-motion: reduce){
    .banner, .headerbar, .hero .pfp-wrap, .hero .intro > *{ animation:none; }
  }
</style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<div class="banner">
  <img src="banner.png" alt="">
</div>

<div class="headerbar">
  <div class="identity">
    <div class="name"><span class="hash">#</span> PROFILE</div>
  </div>
</div>

<div class="wrap">
  <section class="hero">
    <div class="pfp-wrap">
      <img class="pfp" src="pfp.jpg" alt="PrincParshia">
      <img class="pfp-decoration" src="animated.gif" alt="">
    </div>
    <div class="intro">
      <div class="eyebrow">🙋 About Me</div>
      <p class="sub">
        Howdy! I'm <strong>PrincParshia</strong>, a 10th grade student and a Java developer who creates mods for Minecraft: Java Edition. Coding is my passion, and I absolutely love it!
      </p>
      <div class="pillrow">
        <span class="pill primary">Java</span>
        <span class="pill primary">Minecraft</span>
        <span class="pill">Linux</span>
      </div>
    </div>
  </section>
</div>

<script>
const canvas = document.getElementById('matrix-canvas');
const ctx = canvas.getContext('2d');

const PIXEL_SIZE = 8;
const GAP = 3;
const STEP = PIXEL_SIZE + GAP;
const CURSOR_RADIUS = 110;

const COLORS = [
  '#3a3a42', '#323238', '#2e2e36',
  '#404048', '#383840', '#2c2c34'
];

const BAYER4 = [
  [ 0,  8,  2, 10],
  [12,  4, 14,  6],
  [ 3, 11,  1,  9],
  [15,  7, 13,  5]
];
function bayer(c, r) { return BAYER4[r & 3][c & 3] / 16; }

// Zone where the grid dissolves into the blurred banner above it.
// Below FADE_START: no pixels at all (pure banner).
// Between FADE_START and FADE_END: pixels dither in exactly like the
// cursor-hover dissolve (proximity vs. per-pixel bayer threshold + a
// dimmed in-between state), so the boundary reads as a soft, grainy
// melt instead of a line.
// Above FADE_END: the grid behaves exactly as before.
const FADE_START = 0.28;
const FADE_END = 0.52;

let W, H, COLS, ROWS;
let mouse = { x: -9999, y: -9999 };
let grid = [];

// VOID blobs — carve empty holes through the field (many, big)
const NUM_VOID_BLOBS = 35;
let voidBlobs = [];

// SLIME blobs — clusters of high-opacity pixels (chunky islands)
const NUM_SLIME_BLOBS = 14;
let slimeBlobs = [];

function makeBlob(isSlime) {
  return {
    x: Math.random() * W,
    y: H * 0.5 + Math.random() * H * 0.5,
    vx: (Math.random() - 0.5) * (isSlime ? 0.35 : 0.45),
    vy: (Math.random() - 0.5) * (isSlime ? 0.25 : 0.3),
    tx: Math.random() * W,
    ty: H * 0.5 + Math.random() * H * 0.5,
    radius: isSlime
      ? Math.random() * 90 + 60    // slime chunks — medium sized
      : Math.random() * 150 + 100, // void holes — big
    pulsePhase: Math.random() * Math.PI * 2,
    pulseSpeed: Math.random() * 0.008 + 0.003,
    pulseAmp: Math.random() * 25 + 10,
    wanderTimer: Math.random() * 300,
  };
}

function initBlobs() {
  voidBlobs = Array.from({length: NUM_VOID_BLOBS}, () => makeBlob(false));
  slimeBlobs = Array.from({length: NUM_SLIME_BLOBS}, () => makeBlob(true));
}

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  COLS = Math.ceil(W / STEP);
  ROWS = Math.ceil(H / STEP);
  buildGrid();
  initBlobs();
}

function buildGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      const yFrac = (r * STEP) / H;
      grid[r][c] = {
        inZone: yFrac > FADE_START,
        alpha: 0,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        voidPhase: Math.random() * Math.PI * 2,
        voidSpeed: Math.random() * 0.006 + 0.002,
        voidFreqX: Math.random() * 0.25 + 0.1,
        voidFreqY: Math.random() * 0.25 + 0.1,
      };
    }
  }
}

window.addEventListener('resize', resize);
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mouseleave', () => { mouse.x = -9999; mouse.y = -9999; });

// Ghost slime blobs that randomly spawn and fade
let ghosts = [];
let ghostTimer = 100;

function spawnGhost() {
  ghosts.push({
    x: Math.random() * W,
    y: H * 0.5 + Math.random() * H * 0.5,
    radius: 0,
    maxRadius: Math.random() * 80 + 40,
    life: 0,
    growSpeed: Math.random() * 0.007 + 0.003,
    fadeStart: Math.random() * 0.3 + 0.5,
    opacity: 0,
    dead: false,
  });
}

function updateGhosts() {
  ghostTimer--;
  if (ghostTimer <= 0) {
    spawnGhost();
    ghostTimer = Math.floor(Math.random() * 160 + 80);
  }
  for (const g of ghosts) {
    g.life += g.growSpeed;
    g.radius = g.maxRadius * Math.min(1, g.life * 2);
    g.opacity = g.life < g.fadeStart
      ? Math.min(1, g.life / g.fadeStart)
      : 1 - (g.life - g.fadeStart) / (1 - g.fadeStart);
    if (g.life >= 1) g.dead = true;
  }
  ghosts = ghosts.filter(g => !g.dead);
}

function updateBlobSet(blobSet) {
  for (const b of blobSet) {
    b.pulsePhase += b.pulseSpeed;
    b.wanderTimer--;
    if (b.wanderTimer <= 0) {
      b.tx = Math.random() * W;
      b.ty = H * 0.5 + Math.random() * H * 0.5;
      b.wanderTimer = 200 + Math.random() * 400;
    }
    b.vx += (b.tx - b.x) * 0.002;
    b.vy += (b.ty - b.y) * 0.002;
    b.vx *= 0.97; b.vy *= 0.97;
    const spd = Math.sqrt(b.vx*b.vx + b.vy*b.vy);
    if (spd > 0.5) { b.vx = b.vx/spd*0.5; b.vy = b.vy/spd*0.5; }
    b.x += b.vx; b.y += b.vy;
    if (b.x < 0) { b.x=0; b.vx*=-0.5; }
    if (b.x > W) { b.x=W; b.vx*=-0.5; }
    if (b.y < H*0.44) { b.y=H*0.44; b.vy*=-0.5; }
    if (b.y > H) { b.y=H; b.vy*=-0.5; }
  }
}

function influence(blobSet, px, py) {
  let total = 0;
  for (const b of blobSet) {
    const r = b.radius + Math.sin(b.pulsePhase) * b.pulseAmp;
    const dx = px - b.x, dy = py - b.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < r) { const t = 1 - dist/r; total += t*t; }
  }
  return Math.min(1, total);
}

function ghostInfluence(px, py) {
  let total = 0;
  for (const g of ghosts) {
    const dx = px - g.x, dy = py - g.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist < g.radius) { const t = 1-dist/g.radius; total += t*t*g.opacity; }
  }
  return Math.min(1, total);
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  updateBlobSet(voidBlobs);
  updateBlobSet(slimeBlobs);
  updateGhosts();

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      if (!cell.inZone) continue;

      const px = c * STEP, py = r * STEP;
      const cx = px + PIXEL_SIZE/2, cy = py + PIXEL_SIZE/2;

      // Dissolve band: near the top edge, pixels fade using the exact same
      // recipe as the cursor hover effect below — a continuous "proximity"
      // value checked against each pixel's fixed bayer threshold, with a
      // dimmed (not fully hidden) in-between state. Because proximity here
      // eases smoothly with row position and alpha itself is lerped toward
      // its target every frame, the boundary melts in like the liquid does
      // under the mouse rather than snapping between two states.
      const yFrac = py / H;
      let edgeHidden = false;   // this pixel's slot in the top dissolve band says "not yet"
      let edgeDim = 1;          // multiplier applied once a pixel has "arrived" (mirrors cursor's 0.2 dim)
      let edgeLerpSpeed = null;
      if (yFrac < FADE_END) {
        const t = Math.min(1, Math.max(0, (yFrac - FADE_START) / (FADE_END - FADE_START)));
        const proximity = 1 - t; // 1 = right at the top edge, 0 = fully past the band
        const threshold = bayer(c, r);
        if (proximity > threshold) {
          edgeHidden = true;
          edgeLerpSpeed = 0.05 + 0.1 * (1 - proximity); // near the very top, melt away slower/softer
        } else {
          edgeDim = 0.15 + 0.65 * t; // same spirit as the cursor's dim-not-gone state, easing in with t
          edgeLerpSpeed = 0.04 + 0.05 * t;
        }
      }

      if (edgeHidden) {
        cell.alpha += (0 - cell.alpha) * edgeLerpSpeed;
        if (cell.alpha >= 0.01) {
          ctx.globalAlpha = cell.alpha;
          ctx.fillStyle = cell.color;
          ctx.fillRect(px, py, PIXEL_SIZE, PIXEL_SIZE);
        }
        continue;
      }

      const voidInf  = influence(voidBlobs, cx, cy);  // 1 = inside void blob → empty
      const slimeInf = influence(slimeBlobs, cx, cy); // 1 = inside slime chunk → bright
      const gInf     = ghostInfluence(cx, cy);

      // If strongly inside a void, skip
      if (voidInf > 0.85) {
        cell.alpha += (0 - cell.alpha) * 0.05;
        continue;
      }

      // Internal void holes inside slime chunks
      cell.voidPhase += cell.voidSpeed;
      const voidWave = Math.sin(cell.voidPhase + c*cell.voidFreqX)*0.5 + Math.cos(cell.voidPhase*0.7 + r*cell.voidFreqY)*0.5;
      const internalVoid = (voidWave + 1) / 2 < 0.28;

      // Opacity:
      // - base dim field (outside slime blobs): low opacity ~0.15
      // - slime blob area: high opacity ~0.85
      // - ghost spawns: also high opacity
      // - void blobs cut through everything
      // - internal void cuts through slime chunks too
      const voidMask = 1 - voidInf;
      const slimeLevel = Math.max(slimeInf, gInf);
      let target;
      if (internalVoid && slimeLevel > 0.3) {
        target = 0.08 * voidMask;
      } else {
        const dimField  = 0.15 * (1 - slimeLevel);
        const slimeBright = 0.88 * slimeLevel;
        target = (dimField + slimeBright) * voidMask;
      }

      target *= edgeDim;

      // Cursor dither
      const ddx = cx - mouse.x, ddy = cy - mouse.y;
      const dist = Math.sqrt(ddx*ddx + ddy*ddy);
      let lerpSpeed;
      if (dist < CURSOR_RADIUS) {
        const proximity = 1 - dist / CURSOR_RADIUS;
        if (proximity > bayer(c, r)) { target = 0; lerpSpeed = 0.2; }
        else { target *= 0.2; lerpSpeed = 0.08; }
      } else {
        lerpSpeed = edgeLerpSpeed !== null ? edgeLerpSpeed : (target > cell.alpha ? 0.02 : 0.03);
      }

      cell.alpha += (target - cell.alpha) * lerpSpeed;
      if (cell.alpha < 0.01) continue;

      ctx.globalAlpha = Math.min(1, cell.alpha);
      ctx.fillStyle = cell.color;
      ctx.fillRect(px, py, PIXEL_SIZE, PIXEL_SIZE);
    }
  }

  ctx.globalAlpha = 1;
  requestAnimationFrame(draw);
}

resize();
draw();

</script>
</body>
</html>
